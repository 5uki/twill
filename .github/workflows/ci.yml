name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  CARGO_TERM_COLOR: always

jobs:
  fullstack-ci:
    name: Fullstack CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux System Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Fullstack Verification
        run: bun run ci:verify

      - name: Build Tauri Desktop App
        run: bun run ci:desktop-build

  android-build:
    name: Android Build
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: fullstack-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust Target
        run: rustup target add aarch64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Configure Android Environment
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_HOME or ANDROID_SDK_ROOT is not set on this runner" >&2
            exit 1
          fi
          NDK_DIR="$(find "$SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          if [ -z "$NDK_DIR" ]; then
            echo "No Android NDK installation found under $SDK_ROOT/ndk" >&2
            exit 1
          fi
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"

      - name: Initialize Android Project
        shell: bash
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            bunx tauri android init --ci --skip-targets-install
          fi

      - name: Build Android App
        run: bun run ci:android-build

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    timeout-minutes: 60
    needs: fullstack-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add iOS Simulator Rust Target
        run: rustup target add aarch64-apple-ios-sim

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Initialize iOS Project
        shell: bash
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            bunx tauri ios init --ci
          fi

      - name: Build iOS App
        run: bun run ci:ios-build
